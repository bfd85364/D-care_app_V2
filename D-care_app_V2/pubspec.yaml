name: dcare_app
description: "당뇨혈당관리앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  #네트워크 영역 dependency
  dio: ^5.4.3
  retrofit: ^4.3.0
  pretty_dio_logger: ^1.3.1
  cupertino_icons: ^1.0.8

  # 상태관리-UI에 영향을 줄 수 있는 모든 데이터 dependency
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  #.env파일 관련 의존성(dependency)
  flutter_dotenv: ^5.1.0

  #사용자 로컬 저장-어플리케이션 사용자의 정보를 사용자  모바일 기기 SD 카드 등에 저장
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  #UI 컴포넌트
  fl_chart: ^0.68.0 #혈당 추이차트
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1 #로딩 스켈레톤
  shimmer: ^3.0.0

  #날짜 포맷
  intl: ^0.19.0

  #유틸리티 모음
  freezed_annotation: ^2.4.1 #고정 모델 클래스
  json_annotation: ^4.9.0
  equatable: ^2.0.5

# 테스트 영역
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env

